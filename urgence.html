<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urgence</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" href="asavoir.html"><i class="fa-solid fa-arrow-left"></i></a>

    <h1 data-fr="Urgence" data-en="Emergency">Urgence</h1>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="fr" onclick="setLanguage('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    </div>
  </div>
</header>

<main class="content">

  <p class="intro"
     data-fr="En cas d’urgence, voici les informations essentielles pour réagir rapidement."
     data-en="In case of emergency, here is the essential information to react quickly.">
    En cas d’urgence, voici les informations essentielles pour réagir rapidement.
  </p>

  <!-- NUMÉROS -->
  <div class="card-block">
    <div class="icon-wrap"><i class="fa-solid fa-phone"></i></div>
    <div>
      <h3 data-fr="Numéros d'urgence" data-en="Emergency numbers">Numéros d'urgence</h3>
      <p data-fr="15 SAMU • 17 Police • 18 Pompiers • 112 numéro européen"
         data-en="15 Ambulance • 17 Police • 18 Firefighters • 112 European emergency number">
        15 SAMU • 17 Police • 18 Pompiers • 112 numéro européen
      </p>
    </div>
  </div>

  <!-- HÔPITAL -->
  <div class="card-block">
    <div class="icon-wrap"><i class="fa-solid fa-hospital"></i></div>
    <div>
      <h3 data-fr="Hôpital" data-en="Hospital">Hôpital</h3>

      <p data-fr="Le centre hospitalier d’Antibes est le plus proche."
         data-en="Antibes hospital is the nearest.">
        Le centre hospitalier d’Antibes est le plus proche.
      </p>

      <a class="addr"
         href="https://www.google.com/maps/search/?api=1&query=Centre+Hospitalier+Antibes+Juan-les-Pins"
         target="_blank">
        <span data-fr="107 Avenue de Nice, 06600 Antibes"
              data-en="107 Avenue de Nice, 06600 Antibes">
          107 Avenue de Nice, 06600 Antibes
        </span>
      </a>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span data-fr="Accueil" data-en="Home">Accueil</span>
  </a>
  <a href="asavoir.html" class="active">
    <i class="fa-solid fa-circle-info"></i>
    <span data-fr="Appartement" data-en="Apartment">Appartement</span>
  </a>
  <a href="activites.html">
    <i class="fa-solid fa-compass"></i>
    <span data-fr="À proximité" data-en="Nearby">À proximité</span>
  </a>
</nav>

<script>
  function setLanguage(lang) {
    document.querySelectorAll("[data-fr]").forEach(el => {
      const value = el.getAttribute("data-" + lang);
      if (value !== null) el.innerHTML = value;
    });

    localStorage.setItem("siteLang", lang);

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === lang);
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const savedLang = localStorage.getItem("siteLang") || "fr";
    setLanguage(savedLang);
  });
</script>

</body>
</html>
