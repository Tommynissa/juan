<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wi-Fi</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="back-btn" href="asavoir.html">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1>Wi-Fi</h1>
  </div>
</header>

<main class="content">

  <p class="intro">
    Une connexion Wi-Fi est disponible dans tout l’appartement pour vous permettre de naviguer, travailler ou profiter de vos contenus en toute tranquillité.
  </p>

  <article class="card-block wifi-card-premium">
    <div class="icon-wrap">
      <i class="fa-solid fa-wifi"></i>
    </div>

    <div class="wifi-content">
      <h3>Connexion Internet</h3>

      <div class="wifi-details">
        <div class="wifi-line">
          <span class="wifi-label">Nom du réseau</span>
          <span class="wifi-value">ANAÏS_WIFI</span>
        </div>

        <div class="wifi-line">
          <span class="wifi-label">Mot de passe</span>
          <span class="wifi-value">12345678</span>
        </div>
      </div>
    </div>
  </article>

</main>

<nav class="bottom-nav">

    <i class="fa-solid fa-house"></i>
