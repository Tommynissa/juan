<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurants</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="back-btn" href="activites.html"><i class="fa-solid fa-arrow-left"></i></a>

    <h1 data-fr="Restaurant" data-en="Restaurant">Restaurant</h1>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="fr" onclick="setLanguage('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    </div>
  </div>
</header>

<main class="content">

  <p class="intro"
     data-fr="Une adresse recommandée à proximité de l’appartement."
     data-en="A recommended place near the apartment.">
    Une adresse recommandée à proximité de l’appartement.
  </p>

  <article class="place full-width-premium">
    <img src="placeholder.svg" alt="Table d'Asie">
    <div class="body">

      <h3>Table d’Asie</h3>

      <a class="addr"
         href="https://www.google.com/maps/search/?api=1&query=Table+d%27Asie+Avenue+du+Docteur+Fabre+Juan-les-Pins"
         target="_blank">
        Avenue du Docteur Fabre, Juan-les-Pins
      </a>

      <p data-fr="Restaurant asiatique à proximité, idéal pour un repas rapide ou à emporter."
         data-en="Asian restaurant nearby, perfect for a quick meal or takeaway.">
        Restaurant asiatique à proximité, idéal pour un repas rapide ou à emporter.
      </p>

    </div>
  </article>

</main>

<nav class="bottom-nav">
  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span data-fr="Accueil" data-en="Home">Accueil</span>
  </a>
  <a href="asavoir.html">
    <i class="fa-solid fa-circle-info"></i>
    <span data-fr="Appartement" data-en="Apartment">Appartement</span>
  </a>
  <a href="activites.html" class="active">
    <i class="fa-solid fa-compass"></i>
    <span data-fr="À proximité" data-en="Nearby">À proximité</span>
  </a>
</nav>

<script>
  function setLanguage(lang) {
    document.querySelectorAll("[data-fr]").forEach(el => {
      const value = el.getAttribute("data-" + lang);
      if (value !== null) el.innerHTML = value;
    });

    localStorage.setItem("siteLang", lang);

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === lang);
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const savedLang = localStorage.getItem("siteLang") || "fr";
    setLanguage(savedLang);
  });
</script>

</body>
</html>
